<body>

        <button type="button"><a href="index.html">Home</a></button> |

        <button type="button"><a href="game/index.html" target="_blank">Game</a></button>
    </nav>
    <button><img src="Cookie.jpg" width="200" onclick="addScore()"></button>
    <div id="scoreBox">0</div>
    <button onclick="buyMulti()">Buy Multi<div id =upgradecost>10</div></button>
    <button onclick="buyAutoclick()">Buy Autoclick<div id="autoclickcost">15</div></button>
</body>

<script>
    var name = prompt("What is your name?");
    name = name.toLowerCase()
        document.write("Hello, " + name + "!");

    var score = 0;
    var multiplyer = 1.0;
    var autoclickamount = 0;
    var scoreBox = document.getElementById("scoreBox")
    var upgradecost = document.getElementById("upgradecost")
    var autoclickcost = document.getElementById("autoclickcost")

    function addScore() {
        score = score + multiplyer;
        score = score + autoclickamount
        scoreBox.innerHTML = score;
    }

    function buyMulti() {
        if (score >= (multiplyer * 10)) {
            score = score - (multiplyer * 10)
            multiplyer = multiplyer + 0.1;
            scoreBox.innerHTML = score;
            upgradecost.innerHTML = (multiplyer * 10)
        }
    }
    function buyAutoclick() {
        if (score >= (autoclickamount * 15 + 15)) {
            if (autoclickamount == 0) {
                autoclickamount = 1;
                setInterval(
                    () => {
                        score = score + autoclickamount
                        scoreBox.innerHTML = score;
                    },
                    1000
                )
            }
            else {
                
                autoclickamount = (autoclickamount + 1)
                score = score - (autoclickamount * 15 + 15)
                scoreBox.innerHTML = score;
            };
            autoclickcost.innerHTML = (autoclickamount * 15 + 15)
        }
    }

</script>

</html>
